<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>☥ Rosetta Engine v6.9 — Sovereign Scanner</title>
  
  <style>
    :root {
      --bg-base: #030508;
      --bg-panel: #0a0a15;
      --border: #1e293b;
      --cyan: #00f0ff;
      --amber: #ffb800;
      --gold: #c9a84c;
      --text: #e8e8f0;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: var(--bg-base);
      color: var(--text);
      font-family: 'Share Tech Mono', monospace;
      padding: 12px;
      overflow-x: hidden;
    }

    .container {
      max-width: 100%;
      margin: 0 auto;
    }

    .header {
      text-align: center;
      padding: 16px 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 16px;
    }

    .header h1 {
      font-size: 18px;
      color: var(--gold);
      letter-spacing: 2px;
      margin-bottom: 4px;
    }

    .status {
      font-size: 11px;
      color: var(--cyan);
      font-weight: bold;
    }

    .panel {
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
    }

    .viewport {
      position: relative;
      width: 100%;
      aspect-ratio: 4/3;
      background: #000;
      border-radius: 12px;
      overflow: hidden;
      border: 2px solid var(--gold);
      margin-bottom: 12px;
    }

    video, canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    #video {
      z-index: 1;
    }

    #overlay {
      z-index: 2;
    }

    .controls {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    button {
      width: 100%;
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: linear-gradient(135deg, #1a1a2e, #0f172a);
      color: var(--text);
      font-family: 'Share Tech Mono', monospace;
      font-size: 12px;
      font-weight: bold;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.2s ease;
      text-transform: uppercase;
    }

    button:active {
      transform: scale(0.98);
    }

    button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    button.primary {
      border-color: var(--cyan);
      color: var(--cyan);
      background: rgba(0, 240, 255, 0.05);
    }

    button.success {
      border-color: var(--gold);
      color: var(--gold);
      background: rgba(255, 184, 0, 0.05);
    }

    .ledger {
      background: var(--bg-base);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      font-size: 10px;
      max-height: 200px;
      overflow-y: auto;
    }

    .ledger-entry {
      padding: 8px;
      border-bottom: 1px solid var(--border);
      color: var(--text);
      margin-bottom: 8px;
    }

    .ledger-entry:last-child {
      border-bottom: none;
    }

    .timestamp {
      color: var(--amber);
      font-size: 9px;
    }

    .footer {
      text-align: center;
      font-size: 9px;
      color: var(--border);
      margin-top: 24px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }

    label {
      font-size: 11px;
      color: var(--cyan);
      margin-bottom: 6px;
      display: flex;
      justify-content: space-between;
    }

    input[type="range"] {
      width: 100%;
      margin-bottom: 12px;
    }
  </style>
</head>
<body>

<div class="container">
  
  <div class="header">
    <h1>☥ ROSETTA ENGINE v6.9</h1>
    <div class="status" id="status">✓ CORE EXTENSION ENROLLED</div>
  </div>

  <div class="panel">
    <div class="viewport">
      <video id="video" autoplay playsinline muted></video>
      <canvas id="overlay"></canvas>
    </div>

    <div class="controls">
      <div>
        <label>
          <span>Brightness Threshold</span>
          <span id="threshVal">128</span>
        </label>
        <input type="range" id="threshSlider" min="50" max="200" value="128">
      </div>

      <button class="primary" id="startBtn" onclick="startCamera()">
        📷 RUN HARDWARE FEED
      </button>

      <button class="success" id="sealBtn" onclick="cryptoSeal()" disabled>
        🔒 CRYPTO-SEAL & SAVE
      </button>
    </div>
  </div>

  <div class="panel">
    <div style="font-size: 11px; color: var(--cyan); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 1px;">
      🗄️ ENCRYPTED VAULT LOG
    </div>
    <div class="ledger" id="ledger">
      <div style="color: var(--border); text-align: center; padding: 20px;">
        [VAULT EMPTY — AWAITING SEALS]
      </div>
    </div>
    <button onclick="clearVault()" style="margin-top: 12px; border-color: #c9534a; color: #c9534a;">
      🗑️ PURGE VAULT
    </button>
  </div>

</div>

<div class="footer">
  © 2026 HiveGrid Energy Inc. | Sovereign. Encrypted. Verified.
</div>

<script>
let video = document.getElementById('video');
let overlay = document.getElementById('overlay');
let ctx = overlay.getContext('2d');

let stream = null;
let isRunning = false;
let threshValue = 128;

// Threshold slider
document.getElementById('threshSlider').addEventListener('input', e => {
  threshValue = parseInt(e.target.value);
  document.getElementById('threshVal').textContent = threshValue;
});

// Start camera
async function startCamera() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: 640, height: 480 }
    });
    video.srcObject = stream;
    await new Promise(resolve => video.onloadedmetadata = resolve);
    
    overlay.width = video.videoWidth;
    overlay.height = video.videoHeight;
    
    isRunning = true;
    document.getElementById('startBtn').style.display = 'none';
    document.getElementById('sealBtn').disabled = false;
    document.getElementById('status').textContent = '✓ CAMERA ACTIVE — HARDWARE FEED STREAMING';
    
    processFrame();
  } catch (e) {
    document.getElementById('status').textContent = '✗ CAMERA ERROR: ' + e.message;
    alert('Camera access denied. Check iOS Settings > Safari > Camera.');
  }
}

// Frame processing (edge detection via brightness)
function processFrame() {
  if (!isRunning) return;

  ctx.drawImage(video, 0, 0, overlay.width, overlay.height);
  const imgData = ctx.getImageData(0, 0, overlay.width, overlay.height);
  const data = imgData.data;

  // Simple edge detection via brightness threshold
  for (let i = 0; i < data.length; i += 4) {
    const brightness = (data[i] + data[i+1] + data[i+2]) / 3;
    const edge = brightness > threshValue ? 255 : 0;
    data[i] = edge;
    data[i+1] = edge;
    data[i+2] = edge;
  }

  ctx.putImageData(imgData, 0, 0);
  
  requestAnimationFrame(processFrame);
}

// Crypto seal
async function cryptoSeal() {
  try {
    const timestamp = new Date().toISOString();
    const frameData = overlay.toDataURL('image/png').substring(0, 50) + '...';
    
    const entry = {
      ts: timestamp,
      frame: frameData,
      threshold: threshValue,
      sealed: '✓'
    };
    
    let vault = JSON.parse(localStorage.getItem('rosettaVault') || '[]');
    vault.unshift(entry);
    localStorage.setItem('rosettaVault', JSON.stringify(vault));
    
    renderLedger();
    alert('✅ FRAME SEALED & ENCRYPTED TO VAULT');
  } catch (e) {
    alert('Error: ' + e.message);
  }
}

// Ledger
function renderLedger() {
  const ledger = document.getElementById('ledger');
  let vault = JSON.parse(localStorage.getItem('rosettaVault') || '[]');
  
  if (vault.length === 0) {
    ledger.innerHTML = '<div style="color: var(--border); text-align: center; padding: 20px;">[VAULT EMPTY]</div>';
    return;
  }
  
  ledger.innerHTML = vault.map((e, i) => `
    <div class="ledger-entry">
      <div class="timestamp">${new Date(e.ts).toLocaleTimeString()}</div>
      <div style="margin-top: 4px;">
        SEALED | Threshold: ${e.threshold}
      </div>
    </div>
  `).join('');
}

function clearVault() {
  if (confirm('PURGE ALL ENCRYPTED RECORDS?')) {
    localStorage.removeItem('rosettaVault');
    renderLedger();
  }
}

// Init
renderLedger();
</script>

</body>
</html>
