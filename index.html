<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Rosetta Engine v6.6 // Portal Extraction Layer</title>
  <!-- High-velocity asynchronous OpenCV web runtime injection -->
  <script async src="https://docs.opencv.org/4.8.0/opencv.js" type="text/javascript"></script>
  <style>
    :root {
      --bg-base: #030508;
      --bg-panel: #090D16;
      --border-line: #1E293B;
      --neon-cyan: #00F0FF;
      --neon-amber: #FFB800;
      --text-slate: #E2E8F0;
      --alert-red: #EF4444;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background-color: var(--bg-base);
      color: var(--text-slate);
      font-family: 'Courier New', Courier, monospace;
      padding: 12px;
      overflow-x: hidden;
    }

    .rosetta-grid {
      display: grid;
      grid-template-cols: 1fr;
      gap: 16px;
      max-w: 1200px;
      margin: 0 auto;
    }

    @media (min-width: 768px) {
      .rosetta-grid {
        grid-template-cols: 3fr 2fr;
      }
    }

    .panel {
      background-color: var(--bg-panel);
      border: 1px solid var(--border-line);
      border-radius: 16px;
      padding: 16px;
      position: relative;
    }

    .header-hud {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-b: 1px solid var(--border-line);
      padding-bottom: 12px;
      margin-bottom: 16px;
    }

    .hud-title {
      font-size: 12px;
      font-weight: bold;
      letter-spacing: 2px;
      color: var(--neon-cyan);
      text-shadow: 0 0 10px rgba(0, 240, 255, 0.3);
    }

    .viewport-container {
      position: relative;
      width: 100%;
      aspect-ratio: 4/3;
      background-color: #000;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    video, canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100% !important;
      height: 100% !important;
      object-fit: cover;
    }
    
    .pip-wrapper {
      position: absolute;
      bottom: 12px;
      right: 12px;
      width: 120px;
      height: 120px;
      border: 2px solid var(--neon-cyan);
      border-radius: 8px;
      z-index: 30;
      background: #000;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,0.8);
    }

    .pip-title {
      position: absolute;
      top: 2px;
      left: 4px;
      font-size: 8px;
      color: var(--neon-cyan);
      z-index: 40;
      background: rgba(0,0,0,0.7);
      padding: 1px 4px;
      border-radius: 2px;
    }

    .control-row {
      margin-top: 16px;
    }

    .control-row label {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: #94A3B8;
      margin-bottom: 6px;
    }

    input[type="range"] {
      width: 100%;
      height: 6px;
      background: #1E293B;
      border-radius: 4px;
      appearance: none;
      outline: none;
    }

    input[type="range"]::-webkit-slider-thumb {
      appearance: none;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--neon-cyan);
      cursor: pointer;
      box-shadow: 0 0 10px var(--neon-cyan);
    }

    .btn {
      width: 100%;
      background: linear-gradient(135deg, #1E293B, #0F172A);
      border: 1px solid var(--border-line);
      color: #FFF;
      font-size: 11px;
      font-family: monospace;
      font-weight: bold;
      letter-spacing: 1px;
      padding: 16px;
      border-radius: 12px;
      margin-top: 12px;
      cursor: pointer;
      transition: all 0.2s ease-in-out;
    }

    .btn-cyan {
      border-color: var(--neon-cyan);
      color: var(--neon-cyan);
      background: rgba(0, 240, 255, 0.05);
    }

    .btn:active {
      border-color: var(--neon-amber);
      color: var(--neon-amber);
      transform: scale(0.98);
    }

    .btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
      border-color: var(--border-line);
      color: #475569;
    }

    .ledger-container {
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-h: 320px;
      overflow-y: auto;
      margin-top: 12px;
      padding-right: 4px;
    }

    .ledger-row {
      background-color: rgba(255,255,255,0.01);
      border: 1px solid var(--border-line);
      padding: 14px;
      border-radius: 10px;
      font-size: 11px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .ledger-meta {
      display: flex;
      justify-content: space-between;
      color: #475569;
    }

    .ledger-identity {
      font-size: 12px;
      font-weight: bold;
      color: var(--neon-amber);
    }

    .purge-btn {
      font-size: 10px;
      color: var(--alert-red);
      background: none;
      border: none;
      cursor: pointer;
      text-decoration: underline;
      align-self: flex-end;
    }
  </style>
</head>
<body>

  <div class="rosetta-grid">
    
    <!-- LEFT COMPONENT: VISION DECODER HUD -->
    <div class="panel">
      <div class="header-hud">
        <div class="hud-title">☥ ROSETTA PORTAL DECODER v6.6</div>
        <div id="engineStatus" style="font-size: 10px; color: var(--neon-amber); font-weight: bold;">[ ENGINE SECURING COMPILATION ]</div>
      </div>
      
      <div class="viewport-container">
        <video id="hardwareVideo" autoplay playsinline muted style="opacity: 0; z-index: -100;"></video>
        <canvas id="trackingCanvas"></canvas>
        
        <div class="pip-wrapper">
          <div class="pip-title">WARPED CORE</div>
          <canvas id="pipCanvas" width="128" height="128"></canvas>
        </div>
      </div>
    </div>

    <!-- RIGHT COMPONENT: CALIBRATION & AES VAULT -->
    <div>
      <div class="panel">
        <div class="header-hud">
          <div class="hud-title">🎛️ COGNITIVE TUNING</div>
        </div>

        <div class="control-row">
          <label><span>Edge Canny Threshold</span><span id="threshDisplayValue" style="color: var(--neon-cyan)">45</span></label>
          <input type="range" id="thresholdSlider" min="15" max="150" value="45" oninput="document.getElementById('threshDisplayValue').innerText=this.value">
        </div>

        <div class="control-row">
          <label><span>Minimum Contour Area</span><span id="areaDisplayValue" style="color: var(--neon-cyan)">1800</span></label>
          <input type="range" id="areaSlider" min="500" max="10000" value="1800" oninput="document.getElementById('areaDisplayValue').innerText=this.value">
        </div>

        <button class="btn btn-cyan" id="streamInitBtn" disabled onclick="bootHardwareOpticalStream()">📷 RUN HARDWARE FEED</button>
        <button class="btn" id="sealMatrixBtn" disabled onclick="processAsymmetricCryptoSeal()">🔒 CRYPTO-SEAL GLYPH PAYLOAD</button>
      </div>

      <div class="panel">
        <div class="header-hud" style="margin-bottom: 8px;">
          <div class="hud-title">🗄️ AES-GCM SECURE RECORD LOGS</div>
          <button onclick="purgeGlobalVaultMemory()" style="background:none; border:none; color:var(--alert-red); font-size:10px; cursor:pointer; font-family: monospace;">[ PURGE ALL ]</button>
        </div>
        <div class="ledger-container" id="vaultLedgerContainer"></div>
      </div>
    </div>

  </div>

  <script>
    let activeStream = null;
    let frameSourceMat = null;
    let binaryProcessingMat = null;
    let executionState = false;
    let dynamicAsymmetricKey = null;

    // OpenCV runtime safety loop initialization gate
    var Module = {
      onRuntimeInitialized: function() {
        document.getElementById('engineStatus').innerText = "[ CORE EXTENSION ENROLLED ]";
        document.getElementById('engineStatus').style.color = "#00F0FF";
        document.getElementById('streamInitBtn').disabled = false;
      }
    };

    async function bootHardwareOpticalStream() {
      try {
        activeStream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: "environment", width: 640, height: 480 }
        });
        let videoFeed = document.getElementById('hardwareVideo');
        videoFeed.srcObject = activeStream;
        videoFeed.play();
        
        videoFeed.onloadedmetadata = () => {
          frameSourceMat = new cv.Mat(videoFeed.videoHeight, videoFeed.videoWidth, cv.CV_8UC4);
          binaryProcessingMat = new cv.Mat(videoFeed.videoHeight, videoFeed.videoWidth, cv.CV_8UC1);
          executionState = true;
          
          document.getElementById('sealMatrixBtn').disabled = false;
          document.getElementById('streamInitBtn').style.display = "none";
          
          instantiateAsymmetricCryptoSandbox().then(() => {
            refreshVaultLedgerDisplay();
            requestAnimationFrame(renderOpticalProcessingEngine);
          });
        };
      } catch (err) {
        alert("Optical acquisition sequence denied: Check permissions profiles.");
      }
    }

    function renderOpticalProcessingEngine() {
      if (!executionState) return;
      let videoFeed = document.getElementById('hardwareVideo');
      let capture = new cv.VideoCapture(videoFeed);
      capture.read(frameSourceMat);

      cv.cvtColor(frameSourceMat, binaryProcessingMat, cv.COLOR_RGBA2GRAY);
      let threshold = parseInt(document.getElementById('thresholdSlider').value);
      cv.Canny(binaryProcessingMat, binaryProcessingMat, threshold, threshold * 2, 3, false);

      let contoursList = new cv.MatVector();
      let hierarchyMatrix = new cv.Mat();
      cv.findContours(binaryProcessingMat, contoursList, hierarchyMatrix, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);

      let areaFloor = parseInt(document.getElementById('areaSlider').value);
      let validatedPoly = null;
      let targetedSurfaceArea = areaFloor;

      for (let i = 0; i < contoursList.size(); ++i) {
        let contourNode = contoursList.get(i);
        let currentArea = cv.contourArea(contourNode);
        if (currentArea > targetedSurfaceArea) {
          let approxPolygon = new cv.Mat();
          let boundaryArcLength = cv.arcLength(contourNode, true);
          cv.approxPolyDP(contourNode, approxPolygon, 0.02 * boundaryArcLength, true);
          if (approxPolygon.rows === 4) {
            targetedSurfaceArea = currentArea;
            if (validatedPoly) validatedPoly.delete(); // Delete previous best
            validatedPoly = approxPolygon; // Keep this one
          } else {
            approxPolygon.delete(); // Delete non-quads
          }
        }
      }

      if (validatedPoly) {
        executeHomographyTransformation(frameSourceMat, validatedPoly);
        let tracingColor = new cv.Scalar(0, 240, 255, 255);
        cv.drawContours(frameSourceMat, contoursList, -1, tracingColor, 2, cv.LINE_8, hierarchyMatrix, 0);
        validatedPoly.delete(); // Delete the best poly after use
      }

      cv.imshow('trackingCanvas', frameSourceMat);
      contoursList.delete();
      hierarchyMatrix.delete();
      
      requestAnimationFrame(renderOpticalProcessingEngine);
    }

    function executeHomographyTransformation(src, polygonCoordinates) {
      let pipCanvas = document.getElementById('pipCanvas');
      let outputBounds = new cv.Size(pipCanvas.width, pipCanvas.height);
      let transformedDestinationMat = new cv.Mat();
      let extractedCoordinates = [];
      for (let i = 0; i < 4; i++) {
        let indexX = polygonCoordinates.data32S[i * 2];
        let indexY = polygonCoordinates.data32S[i * 2 + 1];
        extractedCoordinates.push({ x: indexX, y: indexY });
      }
      // 4-Corner Clockwise Sort Matrix Correction
      extractedCoordinates.sort((a, b) => a.x - b.x);
      let leftMostPoints = [extractedCoordinates[0], extractedCoordinates[1]].sort((a, b) => a.y - b.y);
      let rightMostPoints = [extractedCoordinates[2], extractedCoordinates[3]].sort((a, b) => a.y - b.y);
      let topLeftPoint = leftMostPoints[0];
      let bottomLeftPoint = leftMostPoints[1];
      let topRightPoint = rightMostPoints[0];
      let bottomRightPoint = rightMostPoints[1];
      let sourceFloatArray = new Float32Array([topLeftPoint.x, topLeftPoint.y, topRightPoint.x, topRightPoint.y, bottomRightPoint.x, bottomRightPoint.y, bottomLeftPoint.x, bottomLeftPoint.y]);
      let destinationFloatArray = new Float32Array([0, 0, pipCanvas.width, 0, pipCanvas.width, pipCanvas.height, 0, pipCanvas.height]);
      let sourceCoordinatesMat = cv.matFromArray(4, 1, cv.CV_32FC2, sourceFloatArray);
      let destinationCoordinatesMat = cv.matFromArray(4, 1, cv.CV_32FC2, destinationFloatArray);
      let perspectiveWarpMatrix = cv.getPerspectiveTransform(sourceCoordinatesMat, destinationCoordinatesMat);
      cv.warpPerspective(src, transformedDestinationMat, perspectiveWarpMatrix, outputBounds, cv.INTER_LINEAR, cv.BORDER_CONSTANT, new cv.Scalar());
      cv.imshow('pipCanvas', transformedDestinationMat);
      transformedDestinationMat.delete();
      sourceCoordinatesMat.delete();
      destinationCoordinatesMat.delete();
      perspectiveWarpMatrix.delete();
    }

    function parseOpticalBitmaskArray() {
      const pipCanvas = document.getElementById('pipCanvas');
      const renderingContext = pipCanvas.getContext('2d');
      if (!renderingContext) return "0".repeat(64);
      const opticalPixels = renderingContext.getImageData(0, 0, pipCanvas.width, pipCanvas.height).data;
      let parsedBitsMatrix = [];
      const horizontalStride = Math.floor(pipCanvas.width / 8);
      const verticalStride = Math.floor(pipCanvas.height / 8);
      for (let row = 0; row < 8; row++) {
        for (let col = 0; col < 8; col++) {
          let averageDensitySum = 0, operationalPixelCount = 0;
          for (let y = row * verticalStride; y < (row + 1) * verticalStride; y++) {
            for (let x = col * horizontalStride; x < (col + 1) * horizontalStride; x++) {
              const baseIndex = (y * pipCanvas.width + x) * 4;
              averageDensitySum += (0.299 * opticalPixels[baseIndex] + 0.587 * opticalPixels[baseIndex + 1] + 0.114 * opticalPixels[baseIndex + 2]);
              operationalPixelCount++;
            }
          }
          parsedBitsMatrix.push((averageDensitySum / operationalPixelCount) > 120 ? "1" : "0");
        }
      }
      return parsedBitsMatrix.join('');
    }

    async function instantiateAsymmetricCryptoSandbox() {
      dynamicAsymmetricKey = await window.crypto.subtle.generateKey(
        { name: "AES-GCM", length: 256 },
        false,
        ["encrypt", "decrypt"]
      );
    }

    async function processAsymmetricCryptoSeal() {
      try {
        const structuralBitmask = parseOpticalBitmaskArray();
        const encoder = new TextEncoder();
        const runtimeMetadataPayload = {
          uniqueNodeId: Date.now(),
          timestampCoordinates: new Date().toLocaleTimeString(),
          calibrationIndex: document.getElementById('thresholdSlider').value,
          extractedMatrixSignature: structuralBitmask
        };
        const convertedBinaryBuffer = encoder.encode(JSON.stringify(runtimeMetadataPayload));
        const transactionInitializationVector = window.crypto.getRandomValues(new Uint8Array(12));
        const encryptedCipherBuffer = await window.crypto.subtle.encrypt(
          { name: "AES-GCM", iv: transactionInitializationVector },
          dynamicAsymmetricKey,
          convertedBinaryBuffer
        );
        const hexadecimalCiphertextString = Array.from(new Uint8Array(encryptedCipherBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
        const hexadecimalIvString = Array.from(transactionInitializationVector).map(b => b.toString(16).padStart(2, '0')).join('');
        localStorage.setItem(`rosetta_v66_ledger_${runtimeMetadataPayload.uniqueNodeId}`, JSON.stringify({
          iv: hexadecimalIvString,
          ciphertext: hexadecimalCiphertextString,
          timestamp: runtimeMetadataPayload.timestampCoordinates,
          matrixSample: structuralBitmask.substring(0, 16) + "..."
        }));
        refreshVaultLedgerDisplay();
        alert("🔒 VAULT LOCKED: Node data safely isolated using AES-GCM 256-bit encryption.");
      } catch (err) {
        console.error("Cryptographic structural rupture: ", err);
      }
    }

    function refreshVaultLedgerDisplay() {
      const containerElement = document.getElementById('vaultLedgerContainer');
      containerElement.innerHTML = "";
      let transactionalKeys = Object.keys(localStorage).filter(k => k.startsWith('rosetta_v66_ledger_')).sort().reverse();
      if (transactionalKeys.length === 0) {
        containerElement.innerHTML = `<div style="color:#475569; text-align:center; font-size:10px; padding:16px;">[ SECURE CRYPTO-CACHE BLANK ]</div>`;
        return;
      }
      transactionalKeys.forEach(key => {
        const itemRecord = JSON.parse(localStorage.getItem(key));
        const rowNode = document.createElement('div');
        rowNode.className = "ledger-row";
        rowNode.innerHTML = `<div class="ledger-meta"><span>BLOCK UNIT #${key.split('_')[3]}</span><span>${itemRecord.timestamp}</span></div> ⬢ SEAL PATTERN: ENVELOPE RECORDED</div> <div style="font-size:9px; color:#475569; font-family:sans-serif; word-break:break-all;">AES-GCM Ciphertext: ${itemRecord.ciphertext.substring(0, 48)}...</div> <button class="purge-btn" onclick="purgeTargetedRecordNode('${key}')">[ PURGE NODE ]</button>`;
        containerElement.appendChild(rowNode);
      });
    }

    function purgeTargetedRecordNode(key) { localStorage.removeItem(key); refreshVaultLedgerDisplay(); }
    function purgeGlobalVaultMemory() { Object.keys(localStorage).filter(k => k.startsWith('rosetta_v66_ledger_')).forEach(k => localStorage.removeItem(k)); refreshVaultLedgerDisplay(); }
  </script>

</body>
</html>
